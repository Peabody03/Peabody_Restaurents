<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Peabody Restaurant</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/customer.css">
</head>
<body class="page-enter">

  <div class="auth-page">
    <div class="auth-brand">
      <div class="auth-brand-content">
        <a href="index.html" class="logo" style="color:#fff;margin-bottom:2rem;"><span class="logo-mark">P</span> Peabody</a>
        <h1>Welcome Back</h1>
        <p>Sign in to access your orders, favorites, and exclusive member offers.</p>
      </div>
    </div>

    <div class="auth-form-panel">
      <div class="auth-form-wrap">
        <h2>Sign In</h2>
        <p>Enter your credentials to continue</p>

        <form>
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <div class="form-input-group">
              <span class="form-input-icon">✉️</span>
              <input type="email" id="email" class="form-input" placeholder="you@example.com">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="form-input-group">
              <span class="form-input-icon">🔒</span>
              <input type="password" id="password" class="form-input" placeholder="Enter your password">
            </div>
          </div>

          <div class="flex-between mb-3" style="flex-wrap:wrap;gap:0.5rem;">
            <label class="form-check">
              <input type="checkbox"> Remember Me
            </label>
            <a href="forgot-password.html" class="text-sm">Forgot Password?</a>
          </div>

          <button type="submit" class="btn btn-primary" style="width:100%;">Sign In</button>
        </form>

        <p class="auth-footer-link">
          Don't have an account? <a href="register.html">Create one</a>
        </p>
      </div>
    </div>
  </div>

  <script src="js/ui.js"></script>
</body>
</html>
