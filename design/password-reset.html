<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Peabody Restaurant</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/customer.css">
</head>
<body class="page-enter">

  <div class="auth-page">
    <div class="auth-brand">
      <div class="auth-brand-content">
        <a href="index.html" class="logo" style="color:#fff;margin-bottom:2rem;"><span class="logo-mark">P</span> Peabody</a>
        <h1>Almost There</h1>
        <p>Enter the verification code and choose a new secure password.</p>
      </div>
    </div>

    <div class="auth-form-panel">
      <div class="auth-form-wrap">
        <h2>Reset Password</h2>
        <p>Enter the 6-digit code sent to your email</p>

        <form>
          <div class="form-group">
            <label class="form-label" for="code">Verification Code</label>
            <input type="text" id="code" class="form-input otp-input" placeholder="000000" maxlength="6">
          </div>

          <div class="form-group">
            <label class="form-label" for="newpass">New Password</label>
            <input type="password" id="newpass" class="form-input" placeholder="Min. 8 characters">
          </div>

          <div class="form-group">
            <label class="form-label" for="confirmpass">Confirm Password</label>
            <input type="password" id="confirmpass" class="form-input" placeholder="Re-enter new password">
          </div>

          <div class="progress mb-3">
            <div class="progress-bar" style="width:66%;"></div>
          </div>
          <p class="text-xs text-muted mb-3">Password strength: Medium — add special characters for stronger security</p>

          <button type="submit" class="btn btn-primary" style="width:100%;">Reset Password</button>
        </form>

        <p class="auth-footer-link">
          Didn't receive a code? <a href="#">Resend Code</a> · <a href="login.html">Back to Sign In</a>
        </p>
      </div>
    </div>
  </div>

  <script src="js/ui.js"></script>
</body>
</html>
