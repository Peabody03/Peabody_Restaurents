<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Peabody Restaurant</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/customer.css">
</head>
<body class="page-enter">

  <div class="auth-page">
    <div class="auth-brand">
      <div class="auth-brand-content">
        <a href="index.html" class="logo" style="color:#fff;margin-bottom:2rem;"><span class="logo-mark">P</span> Peabody</a>
        <h1>Join Peabody</h1>
        <p>Create an account to enjoy faster checkout, order tracking, and personalized recommendations.</p>
      </div>
    </div>

    <div class="auth-form-panel">
      <div class="auth-form-wrap">
        <h2>Create Account</h2>
        <p>Fill in your details to get started</p>

        <form>
          <div class="form-group">
            <label class="form-label" for="fullname">Full Name</label>
            <input type="text" id="fullname" class="form-input" placeholder="John Doe">
          </div>

          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input type="email" id="email" class="form-input" placeholder="you@example.com">
          </div>

          <div class="form-group">
            <label class="form-label" for="phone">Phone Number</label>
            <input type="tel" id="phone" class="form-input" placeholder="0627434348">
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" class="form-input" placeholder="Min. 8 characters">
          </div>

          <div class="form-group">
            <label class="form-label" for="confirm">Confirm Password</label>
            <input type="password" id="confirm" class="form-input" placeholder="Re-enter password">
          </div>

          <label class="form-check mb-3">
            <input type="checkbox">
            I agree to the <a href="#">Terms and Conditions</a> and <a href="#">Privacy Policy</a>
          </label>

          <button type="submit" class="btn btn-primary" style="width:100%;">Register</button>
        </form>

        <p class="auth-footer-link">
          Already have an account? <a href="login.html">Sign In</a>
        </p>
      </div>
    </div>
  </div>

  <script src="js/ui.js"></script>
</body>
</html>
